<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" rx="6" fill="#0a0a0b"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a054"/>
      <stop offset="100%" stop-color="#e8c178"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Central node -->
    <circle cx="16" cy="16" r="2.5" fill="url(#g)"/>
    <!-- Radiating lines with endpoint nodes -->
    <line x1="16" y1="16" x2="16" y2="5" stroke="url(#g)" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="16" cy="5" r="1.3" fill="url(#g)"/>
    <line x1="16" y1="16" x2="16" y2="27" stroke="url(#g)" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="16" cy="27" r="1.3" fill="url(#g)"/>
    <line x1="16" y1="16" x2="5" y2="16" stroke="url(#g)" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="5" cy="16" r="1.3" fill="url(#g)"/>
    <line x1="16" y1="16" x2="27" y2="16" stroke="url(#g)" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="27" cy="16" r="1.3" fill="url(#g)"/>
    <!-- Diagonal lines with nodes -->
    <line x1="16" y1="16" x2="8" y2="8" stroke="url(#g)" stroke-width="0.8" stroke-linecap="round"/>
    <circle cx="8" cy="8" r="1" fill="url(#g)"/>
    <line x1="16" y1="16" x2="24" y2="8" stroke="url(#g)" stroke-width="0.8" stroke-linecap="round"/>
    <circle cx="24" cy="8" r="1" fill="url(#g)"/>
    <line x1="16" y1="16" x2="8" y2="24" stroke="url(#g)" stroke-width="0.8" stroke-linecap="round"/>
    <circle cx="8" cy="24" r="1" fill="url(#g)"/>
    <line x1="16" y1="16" x2="24" y2="24" stroke="url(#g)" stroke-width="0.8" stroke-linecap="round"/>
    <circle cx="24" cy="24" r="1" fill="url(#g)"/>
  </g>
</svg>
